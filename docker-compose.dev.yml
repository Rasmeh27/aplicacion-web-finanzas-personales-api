services:
  postgres:
    image: postgres:16-alpine
    container_name: smartwallet-postgres-dev
    restart: unless-stopped
    environment:
      POSTGRES_DB: smartwallet
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - smartwallet_postgres_dev_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d smartwallet"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: smartwallet-redis-dev
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - smartwallet_redis_dev_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  smartwallet_postgres_dev_data:
  smartwallet_redis_dev_data:
